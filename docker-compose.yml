# Projet : rennes-emploi-dashboard
# Compose project name → préfixe réseau / volumes : rennes-emploi-*
name: rennes-emploi

services:
  dashboard:
    build: .
    image: rennes-emploi-dashboard:latest
    container_name: rennes-emploi-dashboard
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Port machine (évite 3000 si déjà pris) → port interne fixe 3000
      - "${HOST_PORT:-3080}:3000"
    volumes:
      - rennes-emploi-sqlite:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Profil optionnel : docker compose --profile camoufox up -d
  # Définir dans .env : CAMOUFOX_SCRAPER_URL=http://camoufox-scraper:8765 et SCRAPER_TARGET_URL=<page avec JSON-LD Event>
  camoufox-scraper:
    profiles: ["camoufox"]
    build: ./services/camoufox-scraper
    image: rennes-emploi-camoufox:latest
    container_name: rennes-emploi-camoufox
    restart: unless-stopped
    environment:
      SCRAPER_TARGET_URL: ${SCRAPER_TARGET_URL:-}
      SCRAPER_SETTLE_SEC: ${SCRAPER_SETTLE_SEC:-2}
    ports:
      - "${CAMOUFOX_HOST_PORT:-8765}:8765"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

volumes:
  rennes-emploi-sqlite:
    name: rennes-emploi-sqlite
